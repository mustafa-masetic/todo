services:
  todo-server:
    image: ${SERVER_IMAGE}
    restart: unless-stopped
    environment:
      PORT: ${SERVER_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - server_data:/app/server/data

  todo-client:
    image: ${CLIENT_IMAGE}
    restart: unless-stopped
    depends_on:
      - todo-server
    ports:
      - "${APP_PORT}:80"

volumes:
  server_data:
